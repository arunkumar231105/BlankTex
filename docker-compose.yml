# BlankTex full stack: central PostgreSQL + Node API + Nginx.
# Deploy:  docker compose up -d --build
# App is served on http://<server-ip>:${APP_PORT}  (default 8097)
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - /root/decoinks/backend/.env
    environment:
      DB_SCHEMA: blanktex
      PORT: 4000
      SCHEMA_PATH: /app/blanktex_schema.sql
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      UPLOAD_DIR: /app/uploads
      SUPPLIER_CONFIG_PATH: /run/secrets/blanktex-supplier.json
    volumes:
      - purchase_uploads:/app/uploads
      - /root/.blanktex_supplier_config.json:/run/secrets/blanktex-supplier.json:ro
    networks:
      - default
      - decoinks_central
    # No host port mapping — the API is only reached internally via the frontend proxy.
    expose:
      - "4000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8097}:80"
    depends_on:
      - backend

volumes:
  purchase_uploads:

networks:
  decoinks_central:
    external: true
    name: decoinks_decoinks_net
